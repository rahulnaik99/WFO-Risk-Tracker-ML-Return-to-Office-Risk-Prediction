version: "3.9"

services:
  api:
    build: .
    container_name: wfo_api
    ports:
      - "8000:8000"
    command: python run.py
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ui:
    build: .
    container_name: wfo_ui
    ports:
      - "8501:8501"
    command: streamlit run ui.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api
